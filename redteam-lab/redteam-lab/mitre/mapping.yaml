# MITRE ATT&CK → Module Mapping
# Format: technique_id → name, module, tool, params, tactic

# ── Reconnaissance ────────────────────────────────────────────────────────────
T1595:
  name: Active Scanning
  module: recon.subdomain_scan
  tool: subfinder/amass
  tactic: reconnaissance
  params:
    domain: "{{target}}"

T1595.001:
  name: Scanning IP Blocks
  module: recon.nmap_scan
  tool: nmap
  tactic: reconnaissance
  params:
    target: "{{target}}"
    ports: "1-65535"
    flags: "-sV -sC"

T1595.002:
  name: Vulnerability Scanning
  module: vuln_scan.nuclei_scan
  tool: nuclei
  tactic: reconnaissance
  params:
    target: "{{target}}"
    severity: "medium,high,critical"

T1592:
  name: Gather Victim Host Information
  module: recon.http_probe
  tool: httpx
  tactic: reconnaissance
  params:
    target: "{{target}}"

T1046:
  name: Network Service Discovery
  module: recon.nmap_scan
  tool: nmap
  tactic: discovery
  params:
    target: "{{target}}"
    ports: "1-65535"
    flags: "-sV"

T1018:
  name: Remote System Discovery
  module: lateral_movement.network_reachability
  tool: custom/socket
  tactic: discovery
  params:
    network: "{{target}}"

